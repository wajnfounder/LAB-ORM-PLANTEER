{% extends 'Planteer/base.html' %}
{% block content %}

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="auth-box">

        <!-- HEADER -->
        <div class="text-center mb-4">
          <div class="auth-icon">
            <i class="fa-solid fa-leaf"></i>
          </div>
          <h2 class="auth-title mt-3">Create Account</h2>
          <p class="auth-subtitle">Join Planteer and start exploring plants</p>
        </div>

        <!-- ERROR -->
        {% if error %}
          <div class="alert alert-danger rounded-3 mb-3">
            ⚠️ {{ error }}
          </div>
        {% endif %}

        <!-- FORM -->
        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label class="auth-label">Username</label>
            <input type="text" name="username" class="form-control"
                   placeholder="e.g. sara123" required>
          </div>

          <div class="mb-3">
            <label class="auth-label">Email</label>
            <input type="email" name="email" class="form-control"
                   placeholder="example@email.com" required>
          </div>

          <div class="mb-4">
            <label class="auth-label">Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required minlength="6">
          </div>

          <button type="submit" class="btn btn-main w-100">
            Create Account 🌿
          </button>

        </form>

        <p class="text-center mt-4" style="font-size: 14px; color: #888;">
          Already have an account?
          <a href="/login/" class="auth-link">Sign in</a>
        </p>

      </div>

    </div>
  </div>
</div>

{% endblock %}
