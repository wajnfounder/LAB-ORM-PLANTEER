{% extends 'Planteer/base.html' %}
{% load static %}
{% block content %}

<div class="container mt-4">

  <!-- BREADCRUMB -->
  <div class="mb-2">
    <a href="/" class="breadcrumb-link">Home</a>
    <span>›</span>
    <a href="/plants/all/">All Plants</a>
    <span>›</span>
    <span>Add Plant</span>
  </div>

  <!-- TITLE -->
  <h1 class="page-title mb-4">Add New Plant</h1>

  <form method="POST" enctype="multipart/form-data" class="plant-form">
    {% csrf_token %}

    <!-- NAME -->
    <div class="mb-4">
      <label>Plant Name *</label>
      <input type="text" name="name" class="form-control" placeholder="e.g. Monstera Deliciosa">
    </div>

    <!-- ABOUT -->
    <div class="mb-4">
      <label>About *</label>
      <textarea name="about" class="form-control" rows="4"
        placeholder="Describe the plant, its characteristics, and care requirements..."></textarea>
    </div>

    <!-- USED FOR -->
    <div class="mb-4">
      <label>Used For *</label>
      <textarea name="used_for" class="form-control" rows="3"
        placeholder="e.g. Interior decoration, air purification..."></textarea>
    </div>

    <!-- IMAGE -->
    <div class="mb-4">
      <label>Image URL *</label>
      <input type="file" name="image" class="form-control">
        placeholder="https://example.com/image.jpg">
    </div>

    <!-- CATEGORY + EDIBLE -->
    <div class="row mb-4">

      <div class="col-md-6">
        <label>Category *</label>
        <select name="category" class="form-control">
          <option value="TR">Tropical</option>
          <option value="SU">Succulents</option>
          <option value="HE">Herbs</option>
          <option value="FE">Ferns</option>
          <option value="FL">Flowering</option>
          <option value="TRS">Trees</option>
        </select>
      </div>

      <div class="col-md-6 d-flex align-items-end">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" name="is_edible">
          <label class="form-check-label ms-2">Edible</label>
        </div>
      </div>

    </div>

    <!-- BUTTONS -->
    <div class="d-flex gap-3">
      <button class="btn btn-main w-50">+ Add Plant</button>
      <a href="/plants/all/" class="btn btn-light w-50">Cancel</a>
    </div>

  </form>

</div>

{% endblock %}
